": "ch6/png/ch6-p007.png", "label": "第6章 成本優化 - P07/18"}, {"file": "ch6/png/ch6-p008.png", "label": "第6章 成本優化 - P08/18"}, {"file": "ch6/png/ch6-p009.png", "label": "第6章 成本優化 - P09/18"}, {"file": "ch6/png/ch6-p010.png", "label": "第6章 成本優化 - P10/18"}, {"file": "ch6/png/ch6-p011.png", "label": "第6章 成本優化 - P11/18"}, {"file": "ch6/png/ch6-p012.png", "label": "第6章 成本優化 - P12/18"}, {"file": "ch6/png/ch6-p013.png", "label": "第6章 成本優化 - P13/18"}, {"file": "ch6/png/ch6-p014.png", "label": "第6章 成本優化 - P14/18"}, {"file": "ch6/png/ch6-p015.png", "label": "第6章 成本優化 - P15/18"}, {"file": "ch6/png/ch6-p016.png", "label": "第6章 成本優化 - P16/18"}, {"file": "ch6/png/ch6-p017.png", "label": "第6章 成本優化 - P17/18"}, {"file": "ch6/png/ch6-p018.png", "label": "第6章 成本優化 - P18/18"}]}, {"key": "ch7", "label": "第7章 生產工作流", "count": 19, "images": [{"file": "ch7/png/ch7-p001.png", "label": "第7章 生產工作流 - P01/19"}, {"file": "ch7/png/ch7-p002.png", "label": "第7章 生產工作流 - P02/19"}, {"file": "ch7/png/ch7-p003.png", "label": "第7章 生產工作流 - P03/19"}, {"file": "ch7/png/ch7-p004.png", "label": "第7章 生產工作流 - P04/19"}, {"file": "ch7/png/ch7-p005.png", "label": "第7章 生產工作流 - P05/19"}, {"file": "ch7/png/ch7-p006.png", "label": "第7章 生產工作流 - P06/19"}, {"file": "ch7/png/ch7-p007.png", "label": "第7章 生產工作流 - P07/19"}, {"file": "ch7/png/ch7-p008.png", "label": "第7章 生產工作流 - P08/19"}, {"file": "ch7/png/ch7-p009.png", "label": "第7章 生產工作流 - P09/19"}, {"file": "ch7/png/ch7-p010.png", "label": "第7章 生產工作流 - P10/19"}, {"file": "ch7/png/ch7-p011.png", "label": "第7章 生產工作流 - P11/19"}, {"file": "ch7/png/ch7-p012.png", "label": "第7章 生產工作流 - P12/19"}, {"file": "ch7/png/ch7-p013.png", "label": "第7章 生產工作流 - P13/19"}, {"file": "ch7/png/ch7-p014.png", "label": "第7章 生產工作流 - P14/19"}, {"file": "ch7/png/ch7-p015.png", "label": "第7章 生產工作流 - P15/19"}, {"file": "ch7/png/ch7-p016.png", "label": "第7章 生產工作流 - P16/19"}, {"file": "ch7/png/ch7-p017.png", "label": "第7章 生產工作流 - P17/19"}, {"file": "ch7/png/ch7-p018.png", "label": "第7章 生產工作流 - P18/19"}, {"file": "ch7/png/ch7-p019.png", "label": "第7章 生產工作流 - P19/19"}]}];

let curGroup=0, curIdx=0, scale=1, tx=0, ty=0, dragging=false, dragX=0, dragY=0;
const sidebar   = document.getElementById("sidebar");
const viewer    = document.getElementById("viewer");
const img       = document.getElementById("img");
const thumbs    = document.getElementById("thumbs");
const breadcrumb= document.getElementById("breadcrumb");
const badge     = document.getElementById("zoom-badge");
const counter   = document.getElementById("counter");

function buildSidebar() {
  sidebar.innerHTML = "";
  GROUPS.forEach((g, gi) => {
    const btn = document.createElement("button");
    btn.className = "grp-btn" + (gi === curGroup ? " active" : "");
    btn.innerHTML = '<span class="grp-label">' + g.label + '</span><span class="grp-sub">' + g.images.length + ' 頁</span>';
    btn.addEventListener("click", () => switchGroup(gi));
    sidebar.appendChild(btn);
  });
}

function switchGroup(gi) { curGroup = gi; curIdx = 0; buildSidebar(); buildThumbs(); loadImage(); }

function buildThumbs() {
  thumbs.innerHTML = "";
  GROUPS[curGroup].images.forEach((im, i) => {
    const t = document.createElement("img");
    t.className = "thumb" + (i === curIdx ? " active" : "");
    t.src = im.file; t.alt = im.label;
    t.addEventListener("click", () => { curIdx = i; buildThumbs(); loadImage(); });
    thumbs.appendChild(t);
  });
}

function loadImage() {
  const g = GROUPS[curGroup]; const im = g.images[curIdx];
  img.onload = () => fitImage();
  img.src = im.file;
  breadcrumb.textContent = g.label + " › " + im.label;
  counter.textContent = (curIdx + 1) + " / " + g.images.length;
  document.querySelectorAll(".thumb").forEach((t, i) => t.classList.toggle("active", i === curIdx));
  const th = thumbs.children[curIdx];
  if (th) th.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "center" });
}

function fitImage() {
  const PAD = 24;
  scale = Math.min((viewer.clientWidth - PAD*2) / img.naturalWidth, (viewer.clientHeight - PAD*2) / img.naturalHeight);
  tx = (viewer.clientWidth  - img.naturalWidth  * scale) / 2;
  ty = (viewer.clientHeight - img.naturalHeight * scale) / 2;
  applyTransform();
}

function applyTransform() {
  img.style.transform = "matrix(" + scale + ",0,0," + scale + "," + tx + "," + ty + ")";
  badge.textContent = Math.round(scale * 100) + "%";
}

viewer.addEventListener("wheel", e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.13 : 1 / 1.13;
  const newScale = Math.min(Math.max(scale * factor, 0.05), 25);
  const vr = viewer.getBoundingClientRect();
  const cx = e.clientX - vr.left, cy = e.clientY - vr.top;
  tx = cx - (cx - tx) * (newScale / scale);
  ty = cy - (cy - ty) * (newScale / scale);
  scale = newScale; applyTransform();
}, { passive: false });

viewer.addEventListener("mousedown", e => { dragging = true; dragX = e.clientX - tx; dragY = e.clientY - ty; viewer.classList.add("grabbing"); });
window.addEventListener("mousemove", e => { if (!dragging) return; tx = e.clientX - dragX; ty = e.clientY - dragY; applyTransform(); });
window.addEventListener("mouseup", () => { dragging = false; viewer.classList.remove("grabbing"); });
viewer.addEventListener("dblclick", fitImage);

window.addEventListener("keydown", e => {
  const g = GROUPS[curGroup];
  if (e.key === "ArrowRight" || e.key === "ArrowDown") {
    if (curIdx < g.images.length - 1) { curIdx++; buildThumbs(); loadImage(); }
    else if (curGroup < GROUPS.length - 1) { switchGroup(curGroup + 1); }
  } else if (e.key === "ArrowLeft" || e.key === "ArrowUp") {
    if (curIdx > 0) { curIdx--; buildThumbs(); loadImage(); }
    else if (curGroup > 0) { curGroup--; curIdx = GROUPS[curGroup].images.length - 1; buildSidebar(); buildThumbs(); loadImage(); }
  } else if (e.key === "Home") { curIdx = 0; buildThumbs(); loadImage(); }
  else if (e.key === "End") { curIdx = g.images.length - 1; buildThumbs(); loadImage(); }
});

buildSidebar(); buildThumbs(); loadImage(); viewer.focus();
</script>
